<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Site Analyst{% endblock %}</title>
    <script>
        (function() {
            var theme = localStorage.getItem('aiSiteTheme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="/static/css/style.css?v=20260707-ui2">
    <link rel="stylesheet" href="/static/css/user-ui.css?v=20260711-stage12">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/sites" aria-label="AI Site Analyst">
                <span class="brand-mark">AI</span>
                <span class="brand-full">AI Site Analyst</span>
                <span class="brand-short">AI Analyst</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="/sites">Все сайты</a>
            <a href="/clients">Клиенты</a>
            <a href="/free-check">Бесплатная проверка</a>
            <a href="/sites/new">Привязать сайт</a>
            <a href="/account/password">Пароль</a>
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="Сменить тему">
                <span data-theme-toggle-icon>Светлая</span>
            </button>
            <a href="/logout">Выйти</a>
        </div>
    </nav>
    <div class="mobile-floating-nav" data-mobile-menu>
        <button class="mobile-menu-toggle" type="button" data-mobile-menu-toggle aria-label="Открыть меню" aria-controls="mobileFloatingMenu" aria-expanded="false">
            <span aria-hidden="true">☰</span>
        </button>
        <nav class="mobile-menu-panel" id="mobileFloatingMenu" data-mobile-menu-panel aria-label="Мобильное меню">
            <a href="/sites">Мои сайты</a>
            <a href="/clients">Клиенты</a>
            <a href="/free-check">Бесплатная проверка</a>
            <a class="mobile-menu-primary" href="/sites/new">Добавить сайт</a>
            <a href="/account/password">Сменить пароль</a>
            <button class="mobile-menu-item" type="button" data-theme-toggle>
                <span>Тема: </span><strong data-theme-toggle-icon>Светлая</strong>
            </button>
            <a href="/logout">Выйти</a>
        </nav>
    </div>
    <main class="container app-shell">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/ui.js?v=20260711-stage12"></script>
    <script src="/static/js/charts.js?v=6"></script>
</body>
</html>
