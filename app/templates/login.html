<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AI Site Analyst</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">AI Site Analyst</a></div>
        <div class="nav-links"><a href="/register">Регистрация</a></div>
    </nav>
    <main class="container">
        <div class="login-card">
            <h1>Вход</h1>
            <p>Войдите в аккаунт, чтобы управлять сайтами.</p>
            {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ email }}" autofocus required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
        </div>
    </main>
</body>
</html>
