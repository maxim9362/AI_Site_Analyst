<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AI Site Analyst</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">AI Site Analyst</a></div>
        <div class="nav-links"><a href="/register">Регистрация</a></div>
    </nav>
    <main class="container">
        <div class="login-card">
            <h1>Вход</h1>
            <p>Войдите в аккаунт, чтобы управлять сайтами.</p>
            {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
            {% if message %}<div class="alert alert-success">{{ message }}</div>{% endif %}
            {% if google_login_enabled %}
            <a class="btn btn-google" href="/auth/google/start">Войти через Google</a>
            <div class="auth-divider"><span>или</span></div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="{{ email }}" autocomplete="email" autofocus required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Войти</button>
            </form>
            <div class="auth-links">
                <a href="/forgot-password">Забыли пароль?</a>
                <a href="/register">Создать аккаунт</a>
            </div>
        </div>
    </main>
</body>
</html>
